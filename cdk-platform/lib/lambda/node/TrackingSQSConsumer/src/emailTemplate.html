<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Tracking</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 24px;
      color: #1a1a1a;
    }
    .card {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid #eee;
    }
    .product-logo img {
      height: 40px;
      width: auto;
      display: block;
    }
    .charity {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .charity img {
      height: 44px;
      width: auto;
      display: block;
    }
    .charity a {
      color: #c0392b;
      font-weight: 600;
      text-decoration: none;
    }
    .charity a:hover {
      text-decoration: underline;
    }
    .body {
      padding: 24px;
    }
    .greeting {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 12px;
    }
    .message {
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 20px;
    }
    .details {
      background: #f9fafb;
      border-radius: 8px;
      padding: 16px 20px;
    }
    .details dl {
      margin: 0;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 16px;
    }
    .details dt {
      font-weight: 600;
      color: #555;
    }
    .details dd {
      margin: 0;
    }
    .status {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <!-- Software product logo, links to platelet.app -->
      <a class="product-logo" href="https://platelet.app">
        <img src="PRODUCT_LOGO_URL" alt="Platelet logo">
      </a>

      <!-- Charity name + website link, with charity logo beside it -->
      <div class="charity">
        <img src="CHARITY_LOGO_URL" alt="CHARITY_NAME logo">
        <a href="CHARITY_WEBSITE_URL" target="_blank" rel="noopener">CHARITY_NAME</a>
      </div>
    </div>

    <div class="body">
      <p class="greeting">Hello RECIPIENT_NAME,</p>
      <p class="message">
        A delivery is on its way to you, transported by volunteer riders from
        <a href="CHARITY_WEBSITE_URL" target="_blank" rel="noopener">CHARITY_NAME</a>.
        You can track its progress below.
      </p>

      <div class="details">
        <dl>
          <dt>Status</dt>
          <dd><span class="status">In transit</span></dd>
          <dt>Tracking ref</dt>
          <dd>TRACKING_REF</dd>
          <dt>From</dt>
          <dd>ORIGIN</dd>
          <dt>To</dt>
          <dd>DESTINATION</dd>
          <dt>Estimated arrival</dt>
          <dd>ETA</dd>
        </dl>
      </div>
    </div>
  </div>
</body>
</html>
